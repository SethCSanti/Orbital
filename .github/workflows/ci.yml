name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Build & Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore api/Orbital.Api.csproj

      - name: Build
        run: dotnet build api/Orbital.Api.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/ --no-build --configuration Release

  frontend:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: web
        run: bun install

      - name: Type check
        working-directory: web
        run: bun run tsc --noEmit

      - name: Build
        working-directory: web
        run: bun run build